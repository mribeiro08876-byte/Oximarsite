<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Oximar - Sistema de Clientes</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f2f2f2;
}

input, button {
  padding: 10px;
  margin: 5px;
}

button {
  background: #0a7cff;
  color: white;
  border: none;
  cursor: pointer;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  background: white;
  margin: 10px auto;
  padding: 10px;
  width: 80%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-radius: 5px;
}
</style>
</head>

<body>

<h1>Oximar - Cadastro de Clientes</h1>

<input id="nome" placeholder="Nome do cliente">
<button onclick="salvarCliente()">Salvar</button>

<h2>Clientes cadastrados</h2>
<ul id="lista"></ul>

<script>
// 🔥 COLE AQUI A URL DO SEU FIREBASE
const dbURL = https://oximar-a1069-default-rtdb.firebaseio.com/
:
null
;

// 🔥 SALVAR CLIENTE
function salvarCliente() {
  let nome = document.getElementById("nome").value;

  if (!nome) {
    alert("Digite um nome!");
    return;
  }

  fetch(dbURL + "/clientes.json", {
    method: "POST",
    body: JSON.stringify({
      nome: nome
    })
  }).then(() => {
    document.getElementById("nome").value = "";
    carregarClientes();
  });
}

// 🔥 CARREGAR CLIENTES
function carregarClientes() {
  fetch(dbURL + "/clientes.json")
    .then(res => res.json())
    .then(data => {
      let lista = document.getElementById("lista");
      lista.innerHTML = "";

      for (let id in data) {
        let li = document.createElement("li");

        li.innerText = data[id].nome;

        let btn = document.createElement("button");
        btn.innerText = "Excluir";

        btn.onclick = function () {
          fetch(dbURL + "/clientes/" + id + ".json", {
            method: "DELETE"
          }).then(() => carregarClientes());
        };

        li.appendChild(btn);
        lista.appendChild(li);
      }
    });
}

carregarClientes();
</script>

</body>
</html>
