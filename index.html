<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Oximar</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f2f2f2;
}

input, button {
  padding: 10px;
  margin: 5px;
}

button {
  background: #0a7cff;
  color: white;
  border: none;
  cursor: pointer;
}

table {
  margin: auto;
  width: 90%;
  border-collapse: collapse;
  background: white;
}

th, td {
  border: 1px solid #ccc;
  padding: 10px;
}

th {
  background: #0a7cff;
  color: white;
}
</style>
</head>

<body>

<h1>Oximar - Controle de Clientes</h1>

<input id="cliente" placeholder="Cliente">
<input id="pegou" placeholder="O que pegou">
<input id="local" placeholder="Localização">

<button onclick="adicionar()">Adicionar</button>

<table id="tabela">
<tr>
<th>Cliente</th>
<th>Item</th>
<th>Localização</th>
</tr>
</table>

<script>
function adicionar() {
  let tabela = document.getElementById("tabela");

  let cliente = document.getElementById("cliente").value;
  let item = document.getElementById("pegou").value;
  let local = document.getElementById("local").value;

  if (cliente === "") {
    alert("Digite o nome do cliente!");
    return;
  }

  let linha = tabela.insertRow();

  linha.insertCell(0).innerText = cliente;
  linha.insertCell(1).innerText = item;
  linha.insertCell(2).innerText = local;

  document.getElementById("cliente").value = "";
  document.getElementById("pegou").value = "";
  document.getElementById("local").value = "";
}
</script>

</body>
</html>
